name: Docker publish

# 사전빌드 이미지를 GHCR에 게시 → 사용자가 빌드(whisper.cpp 컴파일·LibreOffice 설치) 없이
# `docker compose pull`로 바로 띄울 수 있게 한다(첫 실행 마찰 제거).
# 릴리스 태그(v*) + 수동 실행에서 동작. amd64 + arm64 멀티아치(QEMU 에뮬레이션).
# arm64는 whisper.cpp C++ 컴파일이 에뮬레이션이라 느림(릴리스 빌드 한정, 허용). 공개 후엔
# 네이티브 arm 러너(ubuntu-24.04-arm, 공개 레포 무료)로 매트릭스+매니페스트 병합해 가속 가능.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags/labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}

      - name: Set up QEMU (arm64 에뮬레이션)
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
