name: Bug report
description: Tell us what isn't working
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: What went wrong?
      description: Expected behavior vs. actual behavior
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. error occurs
    validations:
      required: true
  - type: dropdown
    id: engines
    attributes:
      label: Engines in use
      description: Based on the "Current AI engines" badge at the bottom of the home screen
      multiple: true
      options:
        - Local (Ollama / Whisper.cpp / Piper)
        - Cloud (Claude / OpenAI, etc.)
        - stub (USE_STUB_ADAPTERS=1)
  - type: textarea
    id: env
    attributes:
      label: Environment
      placeholder: OS, Node version, browser, OLLAMA_MODEL, etc.
  - type: textarea
    id: logs
    attributes:
      label: Logs / error messages
      render: shell
