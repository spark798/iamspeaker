name: Feature request
description: An improvement or new-feature idea
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: In what situation, and what's inconvenient?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Desired behavior/approach. Please note how it fits the adapter pattern and local-first principle (README) if relevant.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives / references
