services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
    restart: unless-stopped

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - OLLAMA_HOST=http://ollama:11434
      - DATA_DIR=/app/data
      - DATABASE_URL=file:/app/data/iamspeaker.db
    volumes:
      # 업로드/녹음/SQLite/모델 영속 (프라이버시: 데이터는 로컬에만)
      - ./data:/app/data
    depends_on:
      - ollama
    restart: unless-stopped

volumes:
  ollama:
